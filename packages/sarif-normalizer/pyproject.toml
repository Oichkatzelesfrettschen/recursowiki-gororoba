[project]
name = "sarif-normalizer"
version = "0.1.0"
description = "SARIF v2.1.0 normalization, conversion, merging, and deduplication for multi-tool analysis"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "sarif-om>=1.0.4",
    "jschema-to-python>=1.2.3",
]

[dependency-groups]
dev = [
    "pytest>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sarif_normalizer"]
