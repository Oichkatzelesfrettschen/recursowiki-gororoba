[project]
name = "tool-runner"
version = "0.1.0"
description = "23-tool static analysis execution engine with async subprocess management"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "pathspec>=0.12.0",
]

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tool_runner"]
