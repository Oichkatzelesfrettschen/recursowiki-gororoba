[project]
name = "langgraph-orchestrator"
version = "0.1.0"
description = "LangGraph-based orchestrator for multi-tool analysis pipeline with agent synthesis"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "tool-runner",
    "sarif-normalizer",
]

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orchestrator"]
